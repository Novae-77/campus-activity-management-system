<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="校园组织活动管理与数据归档系统前端演示">
  <title>校园组织活动管理系统</title>
  <style>
    :root {
      --primary: #b4232f;
      --primary-dark: #8f1823;
      --primary-soft: #fff1f2;
      --navy: #18212f;
      --navy-2: #222e3d;
      --canvas: #f4f6f8;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --text: #172033;
      --muted: #667085;
      --border: #e4e7ec;
      --success: #16875d;
      --success-soft: #eaf8f2;
      --warning: #b25e09;
      --warning-soft: #fff6e8;
      --danger: #c8323e;
      --danger-soft: #fff0f1;
      --info: #2563a8;
      --info-soft: #edf5ff;
      --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.04);
      --shadow-md: 0 12px 28px rgba(16, 24, 40, 0.12);
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 18px;
      --sidebar: 244px;
      --header: 68px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-width: 1100px;
      background: var(--canvas);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.55;
    }

    button, input, select, textarea { font: inherit; }

    button, select, input[type="checkbox"], input[type="file"] { cursor: pointer; }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(180, 35, 47, 0.18);
      outline-offset: 2px;
    }

    .app { min-height: 100vh; }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 20;
      width: var(--sidebar);
      padding: 22px 16px;
      background: var(--navy);
      color: #fff;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 8px 24px;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }

    .brand-mark {
      display: grid;
      width: 40px;
      height: 40px;
      place-items: center;
      border-radius: 11px;
      background: var(--primary);
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(180, 35, 47, .28);
    }

    .brand-name { font-size: 15px; font-weight: 700; letter-spacing: .02em; }
    .brand-sub { color: #aab5c4; font-size: 12px; }

    .nav-label {
      padding: 24px 12px 8px;
      color: #7f8b9d;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
    }

    .nav-list { display: grid; gap: 6px; }

    .nav-item {
      display: flex;
      width: 100%;
      min-height: 44px;
      align-items: center;
      gap: 11px;
      padding: 0 13px;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #c9d1dc;
      text-align: left;
      transition: background .18s ease, color .18s ease;
    }

    .nav-item:hover { background: rgba(255,255,255,.07); color: #fff; }
    .nav-item.active { background: var(--primary); color: #fff; }

    .nav-glyph {
      display: grid;
      width: 23px;
      height: 23px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid currentColor;
      border-radius: 7px;
      font-size: 11px;
      font-weight: 700;
      opacity: .9;
    }

    .sidebar-foot {
      position: absolute;
      right: 16px;
      bottom: 20px;
      left: 16px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      background: rgba(255,255,255,.045);
      color: #aab5c4;
      font-size: 12px;
    }

    .main-shell { margin-left: var(--sidebar); min-height: 100vh; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 15;
      display: flex;
      height: var(--header);
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
    }

    .breadcrumb { color: var(--muted); font-size: 13px; }
    .breadcrumb strong { color: var(--text); }

    .top-actions { display: flex; align-items: center; gap: 12px; }

    .backend-status {
      display: inline-flex;
      min-height: 34px;
      align-items: center;
      gap: 7px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .backend-status::before {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--warning);
      content: "";
    }

    .backend-status.connected { color: var(--success); }
    .backend-status.connected::before { background: var(--success); }
    .backend-status.saving { color: var(--info); }
    .backend-status.saving::before { background: var(--info); }
    .backend-status.offline { color: var(--danger); }
    .backend-status.offline::before { background: var(--danger); }

    .role-switch {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 6px 5px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--muted);
    }

    .role-switch select {
      min-height: 34px;
      border: 0;
      background: var(--surface-2);
      color: var(--text);
      font-weight: 600;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 9px;
      padding-left: 12px;
      border-left: 1px solid var(--border);
    }

    .avatar {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 50%;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 700;
    }

    .user-name { font-weight: 700; }
    .user-role { color: var(--muted); font-size: 12px; }

    main { padding: 28px; }

    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    h1, h2, h3, h4, p { margin-top: 0; }
    h1 { margin-bottom: 5px; font-size: 26px; line-height: 1.3; letter-spacing: -.02em; }
    h2 { margin-bottom: 4px; font-size: 18px; }
    h3 { font-size: 16px; }
    .page-desc { margin-bottom: 0; color: var(--muted); }

    .btn {
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 8px 15px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      white-space: nowrap;
      transition: background .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .btn:hover { background: var(--primary-dark); }
    .btn.secondary { border-color: var(--border); background: #fff; color: #344054; }
    .btn.secondary:hover { border-color: #c5cad3; background: var(--surface-2); }
    .btn.ghost { min-height: 34px; padding: 6px 10px; background: transparent; color: var(--info); }
    .btn.ghost:hover { background: var(--info-soft); }
    .btn.danger { background: var(--danger); }
    .btn.danger:hover { background: #a91f2b; }
    .btn.danger-ghost { min-height: 34px; padding: 6px 10px; background: transparent; color: var(--danger); }
    .btn.danger-ghost:hover { background: var(--danger-soft); }
    .btn.small { min-height: 34px; padding: 6px 11px; font-size: 13px; }
    .btn:disabled { cursor: not-allowed; opacity: .48; }

    .plus {
      font-size: 19px;
      font-weight: 400;
      line-height: 1;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }

    .stat-card { position: relative; overflow: hidden; padding: 19px 20px; }
    .stat-card::after {
      position: absolute;
      top: 0;
      right: 0;
      width: 72px;
      height: 72px;
      border-radius: 0 0 0 72px;
      background: var(--stat-soft, var(--primary-soft));
      content: "";
    }
    .stat-label { color: var(--muted); font-size: 13px; font-weight: 600; }
    .stat-value { margin: 8px 0 3px; font-size: 29px; font-weight: 750; font-variant-numeric: tabular-nums; }
    .stat-note { color: var(--muted); font-size: 12px; }
    .stat-card.green { --stat-soft: var(--success-soft); }
    .stat-card.blue { --stat-soft: var(--info-soft); }
    .stat-card.amber { --stat-soft: var(--warning-soft); }

    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(300px, .8fr);
      gap: 18px;
    }

    .section-head {
      display: flex;
      min-height: 61px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
    }

    .section-head h2, .section-head h3 { margin: 0; }
    .section-body { padding: 20px; }

    .progress-list { display: grid; gap: 19px; }
    .progress-row-head { display: flex; justify-content: space-between; margin-bottom: 7px; }
    .progress-label { font-weight: 600; }
    .progress-value { color: var(--muted); font-variant-numeric: tabular-nums; }
    .progress-track { height: 8px; overflow: hidden; border-radius: 999px; background: #eef1f4; }
    .progress-fill { height: 100%; border-radius: inherit; background: var(--primary); }
    .progress-fill.green { background: var(--success); }
    .progress-fill.blue { background: var(--info); }

    .activity-mini-list { display: grid; gap: 0; }
    .activity-mini {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
    }
    .activity-mini:last-child { border-bottom: 0; }
    .date-block {
      padding: 6px 4px;
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--muted);
      text-align: center;
      font-size: 11px;
      line-height: 1.2;
    }
    .date-block strong { display: block; color: var(--text); font-size: 18px; }
    .mini-name { overflow: hidden; font-weight: 650; text-overflow: ellipsis; white-space: nowrap; }
    .mini-meta { color: var(--muted); font-size: 12px; }

    .filter-card { margin-bottom: 16px; padding: 16px; }

    .filters {
      display: grid;
      grid-template-columns: minmax(200px, 1.4fr) repeat(4, minmax(130px, .8fr)) auto;
      gap: 12px;
      align-items: end;
    }

    .field { display: grid; gap: 7px; min-width: 0; }
    .field label { color: #475467; font-size: 13px; font-weight: 650; }
    .required::after { margin-left: 3px; color: var(--danger); content: "*"; }

    .input,
    .select,
    .textarea {
      width: 100%;
      min-height: 40px;
      padding: 9px 11px;
      border: 1px solid #d0d5dd;
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--text);
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .input:hover, .select:hover, .textarea:hover { border-color: #aeb4bf; }
    .input:focus, .select:focus, .textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(180,35,47,.1);
      outline: 0;
    }
    .textarea { min-height: 112px; resize: vertical; }
    .field-help { margin-top: -2px; color: var(--muted); font-size: 12px; }
    .field-error { color: var(--danger); font-size: 12px; }

    .table-card { overflow: hidden; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 13px 15px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: middle; }
    th { background: var(--surface-2); color: #475467; font-size: 12px; font-weight: 700; white-space: nowrap; }
    td { font-size: 13px; }
    tbody tr { transition: background .15s ease; }
    tbody tr:hover { background: #fbfcfd; }
    tbody tr:last-child td { border-bottom: 0; }
    .name-cell { max-width: 260px; font-weight: 650; }
    .sub-cell { display: block; margin-top: 2px; color: var(--muted); font-size: 12px; font-weight: 400; }
    .number { font-variant-numeric: tabular-nums; }
    .actions { display: flex; align-items: center; gap: 2px; white-space: nowrap; }

    .tag {
      display: inline-flex;
      min-height: 25px;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #f0f2f5;
      color: #475467;
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }
    .tag::before { width: 6px; height: 6px; border-radius: 50%; background: currentColor; content: ""; }
    .tag.success { background: var(--success-soft); color: var(--success); }
    .tag.warning { background: var(--warning-soft); color: var(--warning); }
    .tag.danger { background: var(--danger-soft); color: var(--danger); }
    .tag.info { background: var(--info-soft); color: var(--info); }
    .tag.primary { background: var(--primary-soft); color: var(--primary); }

    .empty {
      padding: 54px 20px;
      color: var(--muted);
      text-align: center;
    }
    .empty-mark {
      display: grid;
      width: 46px;
      height: 46px;
      margin: 0 auto 12px;
      place-items: center;
      border: 1px dashed #b9c0ca;
      border-radius: 14px;
      background: var(--surface-2);
      font-size: 18px;
      font-weight: 700;
    }
    .empty strong { display: block; margin-bottom: 4px; color: var(--text); }

    .student-hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 20px;
      padding: 24px 26px;
      border: 1px solid #f1c8cc;
      border-radius: var(--radius-lg);
      background: linear-gradient(120deg, #fff 0%, #fff7f7 64%, #fff0f1 100%);
    }
    .student-hero h1 { font-size: 24px; }
    .student-hero p { max-width: 690px; margin: 0; color: var(--muted); }
    .hero-count { min-width: 128px; text-align: center; }
    .hero-count strong { display: block; color: var(--primary); font-size: 32px; }
    .hero-count span { color: var(--muted); font-size: 12px; }

    .student-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .activity-card {
      position: relative;
      display: flex;
      min-height: 258px;
      flex-direction: column;
      padding: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow-sm);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .activity-card:hover { transform: translateY(-2px); border-color: #d2a2a7; box-shadow: 0 12px 24px rgba(16,24,40,.08); }
    .activity-card::before { position: absolute; inset: 0 auto 0 0; width: 4px; background: var(--primary); content: ""; }
    .card-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .activity-card h3 { margin: 16px 0 9px; font-size: 17px; line-height: 1.45; }
    .activity-card p {
      display: -webkit-box;
      margin-bottom: 18px;
      overflow: hidden;
      color: var(--muted);
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }
    .card-meta { display: grid; gap: 8px; margin-top: auto; color: #475467; font-size: 13px; }
    .card-meta-row { display: flex; justify-content: space-between; gap: 12px; }
    .card-meta-row span:first-child { color: var(--muted); }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: stretch;
      justify-content: flex-end;
      background: rgba(15, 23, 42, .52);
    }
    .overlay.open { display: flex; }

    .drawer {
      width: min(720px, 64vw);
      height: 100%;
      overflow: auto;
      background: #fff;
      box-shadow: var(--shadow-md);
      animation: slideIn .22s ease-out;
    }
    .drawer.wide { width: min(920px, 76vw); }

    @keyframes slideIn {
      from { opacity: .4; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .drawer-head {
      position: sticky;
      top: 0;
      z-index: 4;
      display: flex;
      min-height: 72px;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(10px);
    }
    .drawer-head h2 { margin: 0; }

    .icon-btn {
      display: grid;
      width: 40px;
      height: 40px;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #fff;
      color: #475467;
      font-size: 21px;
      line-height: 1;
    }
    .icon-btn:hover { background: var(--surface-2); }

    .drawer-body { padding: 24px; }
    .drawer-foot {
      position: sticky;
      bottom: 0;
      z-index: 4;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(10px);
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 17px; }
    .form-grid .span-2 { grid-column: 1 / -1; }

    .check-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      max-height: 210px;
      padding: 12px;
      overflow: auto;
      border: 1px solid #d0d5dd;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
    }
    .check-item {
      display: flex;
      min-height: 42px;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
    }
    .check-item input { width: 17px; height: 17px; }
    .check-item small { margin-left: auto; color: var(--muted); }

    .detail-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 18px 0;
    }
    .detail-summary > div { padding: 12px; border-radius: 9px; background: var(--surface-2); }
    .detail-summary span { display: block; color: var(--muted); font-size: 12px; }
    .detail-summary strong { display: block; margin-top: 3px; }

    .tabs { display: flex; gap: 4px; margin: 22px 0 16px; border-bottom: 1px solid var(--border); }
    .tab {
      min-height: 42px;
      padding: 0 13px;
      border: 0;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--muted);
      font-weight: 650;
    }
    .tab.active { border-bottom-color: var(--primary); color: var(--primary); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .attendance-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .attendance-list { overflow: hidden; border: 1px solid var(--border); border-radius: 10px; }
    .attendance-row {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) 150px 140px;
      gap: 12px;
      align-items: center;
      padding: 11px 13px;
      border-bottom: 1px solid var(--border);
    }
    .attendance-row:last-child { border-bottom: 0; }
    .attendance-row.header { background: var(--surface-2); color: var(--muted); font-size: 12px; font-weight: 700; }

    .upload-box {
      display: grid;
      min-height: 112px;
      place-items: center;
      padding: 18px;
      border: 1px dashed #aab2bd;
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--muted);
      text-align: center;
    }
    .upload-box input { max-width: 280px; }
    .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
    .image-item { position: relative; overflow: hidden; border: 1px solid var(--border); border-radius: 9px; background: var(--surface-2); }
    .image-item img { display: block; width: 100%; height: 120px; object-fit: cover; }
    .image-item button {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 7px;
      background: rgba(15,23,42,.76);
      color: #fff;
    }
    .image-name { padding: 7px 8px; overflow: hidden; font-size: 11px; text-overflow: ellipsis; white-space: nowrap; }

    .timeline { position: relative; display: grid; gap: 14px; padding-left: 20px; }
    .timeline::before { position: absolute; top: 5px; bottom: 5px; left: 5px; width: 1px; background: var(--border); content: ""; }
    .timeline-item { position: relative; }
    .timeline-item::before {
      position: absolute;
      top: 5px;
      left: -19px;
      width: 9px;
      height: 9px;
      border: 2px solid #fff;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 0 1px var(--primary);
      content: "";
    }
    .timeline-title { font-weight: 650; }
    .timeline-meta { color: var(--muted); font-size: 12px; }
    .timeline-desc { margin-top: 3px; color: #475467; font-size: 13px; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 130;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(15,23,42,.55);
    }
    .modal-overlay.open { display: grid; }
    .modal {
      width: min(480px, 92vw);
      overflow: hidden;
      border-radius: 14px;
      background: #fff;
      box-shadow: var(--shadow-md);
      animation: popIn .18s ease-out;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.97) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-head { padding: 20px 22px 0; }
    .modal-head h3 { margin-bottom: 6px; font-size: 18px; }
    .modal-body { padding: 12px 22px 20px; color: #475467; }
    .modal-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 15px 22px; border-top: 1px solid var(--border); background: var(--surface-2); }

    .toast-stack { position: fixed; z-index: 200; top: 82px; right: 24px; display: grid; gap: 10px; }
    .toast {
      min-width: 280px;
      max-width: 380px;
      padding: 13px 15px;
      border: 1px solid #bbdfd1;
      border-radius: 10px;
      background: #f0fbf6;
      color: #116a49;
      box-shadow: var(--shadow-md);
      animation: toastIn .2s ease-out;
    }
    .toast.error { border-color: #f0c5ca; background: var(--danger-soft); color: var(--danger); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-8px); } }

    .log-filter { display: flex; gap: 12px; padding: 16px; border-bottom: 1px solid var(--border); }
    .log-list { padding: 4px 20px 20px; }
    .log-row {
      display: grid;
      grid-template-columns: 170px 110px 150px minmax(0, 1fr);
      gap: 15px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      align-items: start;
    }
    .log-row:last-child { border-bottom: 0; }
    .log-time, .log-actor { color: var(--muted); font-size: 12px; }

    .type-color { display: inline-block; width: 10px; height: 10px; margin-right: 7px; border-radius: 50%; }

    .archive-callout {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 18px;
      padding: 15px;
      border: 1px solid #efd0d3;
      border-radius: 10px;
      background: var(--primary-soft);
    }
    .archive-callout strong { display: block; }
    .archive-callout p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }

    .muted { color: var(--muted); }
    .text-danger { color: var(--danger); }
    .hidden { display: none !important; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>

          participants: [

          ],
          minutes: "成员共同参观校史展览，并围绕校史精神与青年责任进行交流。活动材料已整理完毕。",
          images: [],

          cancelled: false,
          deleted: false,
          version: 1,
          versions: [{ version: 1, time: offsetDate(-28, 15), actor: ADMIN.name, note: "创建活动" }],
          createdBy: ADMIN.name,
          createdAt: offsetDate(-28, 15),
          updatedBy: ADMIN.name,
          updatedAt: offsetDate(-21, 10)
        }
      ];
      return {
        role: "admin",
        studentId: "u2",
        view: "dashboard",
        users,
        types,
        activities,
        logs: [
          { id: cryptoId(), time: new Date().toISOString(), actor: ADMIN.name, action: "系统初始化", target: "演示数据", detail: "载入校园组织活动管理系统 Demo" },
          { id: cryptoId(), time: offsetDate(-4, 9), actor: ADMIN.name, action: "归档活动", target: "支部组织生活会与阶段工作复盘", detail: "完成签到与会议纪要归档" },
          { id: cryptoId(), time: offsetDate(-6, 16), actor: ADMIN.name, action: "修改活动", target: "支部组织生活会与阶段工作复盘", detail: "活动版本更新至 V2" }
        ]

    function cryptoId() {
      return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
    }

    let state = loadState();
    let activityFilters = { keyword: "", start: "", end: "", typeId: "", personId: "", status: "" };
    let studentFilters = { keyword: "", typeId: "", status: "" };
    let logFilters = { keyword: "", action: "" };
    let activeDetailId = null;
    let confirmAction = null;
    let backendStatus = "connecting";
    let saveRevision = 0;
    let saveInFlight = false;
    let saveTimer = null;

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : initialState();
      } catch (error) {
        console.warn("无法读取本地数据，已恢复演示数据。", error);
        return initialState();
      }
    }

    function saveLocalCache() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function databaseState() {
      return {
        users: state.users,
        types: state.types,
        activities: state.activities,
        logs: state.logs
      };
    }

    function setBackendStatus(status) {
      backendStatus = status;
      const indicator = document.getElementById("backendStatus");
      if (!indicator) return;
      const labels = {
        connecting: "正在连接数据库",
        connected: "数据库已连接",
        saving: "正在保存",
        offline: "本地缓存模式"
      };
      indicator.className = `backend-status ${status}`;
      indicator.textContent = labels[status];
    }

    function saveState() {
      saveLocalCache();
      saveRevision += 1;

      if (!location.protocol.startsWith("http")) {
        setBackendStatus("offline");
        return;
      }

      setBackendStatus("saving");
      clearTimeout(saveTimer);
      saveTimer = setTimeout(flushBackendState, 140);
    }

    async function flushBackendState() {
      if (saveInFlight) return;
      saveInFlight = true;
      const revision = saveRevision;

      try {
        const response = await fetch(API_STATE_URL, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ state: databaseState() })
        });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.error || "保存失败");
        }
        setBackendStatus("connected");
      } catch (error) {
        console.warn("数据库保存失败，继续使用本地缓存。", error);
        setBackendStatus("offline");
      } finally {
        saveInFlight = false;
        if (revision !== saveRevision) {
          clearTimeout(saveTimer);
          saveTimer = setTimeout(flushBackendState, 0);
        }
      }
    }

    async function hydrateFromBackend() {
      if (!location.protocol.startsWith("http")) {
        setBackendStatus("offline");
        return;
      }

      try {
        const response = await fetch(API_STATE_URL, { cache: "no-store" });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.error || "读取失败");
        }

        if (result.initialized && result.state) {
          const uiState = {
            role: state.role,
            studentId: state.studentId,
            view: state.view
          };
          state = { ...state, ...result.state, ...uiState };
          saveLocalCache();
        } else {
          saveRevision += 1;
          await flushBackendState();
        }

        setBackendStatus("connected");
        renderApp();
      } catch (error) {
        console.warn("数据库连接失败，继续使用本地缓存。", error);
        setBackendStatus("offline");
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDateTime(value) {
      if (!value) return "-";
      return new Intl.DateTimeFormat("zh-CN", {
        year: "numeric", month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit", hour12: false
      }).format(new Date(value)).replaceAll("/", "-");
    }

    function formatShortDate(value) {
      const date = new Date(value);
      return {
        day: pad(date.getDate()),
        month: `${date.getMonth() + 1}月`,
        full: new Intl.DateTimeFormat("zh-CN", { month: "long", day: "numeric", weekday: "short" }).format(date)
      };
    }

    function getUser(id) {
      return state.users.find(user => user.id === id) || { name: "未知人员", number: "-" };
    }

    function getType(id) {
      return state.types.find(type => type.id === id) || { name: "未分类", color: "#667085" };
    }

    function getActivity(id) {
      return state.activities.find(activity => activity.id === id);
    }

    function activityStatus(activity) {
      if (activity.cancelled) return "已取消";
      if (activity.archived) return "已归档";
      const now = Date.now();
      if (new Date(activity.start).getTime() > now) return "未开始";
      if (new Date(activity.end).getTime() >= now) return "进行中";
      const attendanceComplete = activity.participants.length > 0 &&
        activity.participants.every(item => item.attendance !== "待登记");
      if (activity.minutes.trim() && attendanceComplete) return "已完成";
      return "待完善";
    }

    function statusTag(status) {
      const classMap = {
        "未开始": "info",
        "进行中": "primary",
        "待完善": "warning",
        "已完成": "success",
        "已归档": "success",
        "已取消": "danger"
      };
      return `<span class="tag ${classMap[status] || ""}">${escapeHtml(status)}</span>`;
    }

    function attendanceTag(status) {
      const classMap = { "已签到": "success", "请假": "warning", "缺席": "danger", "待登记": "" };
      return `<span class="tag ${classMap[status] || ""}">${escapeHtml(status)}</span>`;
    }

    function visibleActivities() {
      return state.activities.filter(activity => !activity.deleted);
    }

    function filteredActivities(filters = activityFilters) {
      const keyword = filters.keyword.trim().toLowerCase();
      return visibleActivities()
        .filter(activity => {
          const people = activity.participants.map(item => getUser(item.userId).name).join(" ");
          const content = `${activity.name} ${getUser(activity.leaderId).name} ${activity.location} ${people}`.toLowerCase();
          const start = new Date(activity.start);
          const matchKeyword = !keyword || content.includes(keyword);
          const matchStart = !filters.start || start >= new Date(`${filters.start}T00:00:00`);
          const matchEnd = !filters.end || start <= new Date(`${filters.end}T23:59:59`);
          const matchType = !filters.typeId || activity.typeId === filters.typeId;
          const matchPerson = !filters.personId || activity.participants.some(item => item.userId === filters.personId);
          const matchStatus = !filters.status || activityStatus(activity) === filters.status;
          return matchKeyword && matchStart && matchEnd && matchType && matchPerson && matchStatus;
        })
        .sort((a, b) => new Date(b.start) - new Date(a.start));
    }

    function calculateStats(activities = visibleActivities()) {
      const eligible = activities.filter(item => !item.cancelled);
      const ended = eligible.filter(item => new Date(item.end).getTime() < Date.now());
      const archived = ended.filter(item => item.archived).length;
      const participants = eligible.flatMap(item => item.participants);
      const signed = participants.filter(item => item.attendance === "已签到").length;
      const leave = participants.filter(item => item.attendance === "请假").length;
      return {
        total: activities.length,
        archived,
        archiveRate: ended.length ? Math.round(archived / ended.length * 100) : 0,
        attendanceRate: participants.length ? Math.round(signed / participants.length * 100) : 0,
        leaveRate: participants.length ? Math.round(leave / participants.length * 100) : 0,
        participantCount: participants.length
      };
    }

    function logAction(action, target, detail) {
      state.logs.unshift({
        id: cryptoId(),
        time: new Date().toISOString(),
        actor: ADMIN.name,
        action,
        target,
        detail
      });
    }

    function toast(message, type = "success") {
      const stack = document.getElementById("toastStack");
      const element = document.createElement("div");
      element.className = `toast ${type === "error" ? "error" : ""}`;
      element.textContent = message;
      stack.appendChild(element);
      setTimeout(() => element.remove(), 3500);
    }

    }

    function currentPageName() {
      const names = {
        dashboard: "数据看板",
        activities: "活动管理",
        people: "人员管理",
        types: "活动类型",
        logs: "操作日志",

    function renderTopbar() {
      const student = getUser(state.studentId);
      const current = state.role === "admin" ? ADMIN : student;
      return `
        <header class="topbar">
          <div class="breadcrumb">校园组织活动管理 / <strong>${currentPageName()}</strong></div>
          <div class="top-actions">
            <div id="backendStatus" class="backend-status ${backendStatus}">
              ${backendStatus === "connected" ? "数据库已连接" : backendStatus === "saving" ? "正在保存" : backendStatus === "offline" ? "本地缓存模式" : "正在连接数据库"}
            </div>
            <div class="role-switch">
              <span>演示身份</span>
              <select id="roleSelect" aria-label="切换演示身份">
                <option value="admin" ${state.role === "admin" ? "selected" : ""}>管理员端</option>
                <option value="student" ${state.role === "student" ? "selected" : ""}>学生端</option>
              </select>
            </div>
            ${state.role === "student" ? `
              <select id="studentSelect" class="select" aria-label="切换学生" style="width:138px;min-height:36px">
                ${state.users.filter(user => user.active).map(user => `<option value="${user.id}" ${state.studentId === user.id ? "selected" : ""}>${escapeHtml(user.name)}</option>`).join("")}

            ` : ""}
            <div class="user-chip">
              <div class="avatar">${escapeHtml(current.name.slice(0, 1))}</div>
              <div>
                <div class="user-name">${escapeHtml(current.name)}</div>
                <div class="user-role">${state.role === "admin" ? "系统管理员" : current.number}</div>
              </div>
            </div>
          </div>
        </header>
      `;
    }

    function renderView() {
      const views = {
        dashboard: renderDashboard,
        activities: renderActivityManagement,
        people: renderPeople,
        types: renderTypes,
        logs: renderLogs,
        studentActivities: renderStudentActivities
      };
      return (views[state.view] || renderDashboard)();
    }

    function renderDashboard() {

          ${statCard("出勤率", `${stats.attendanceRate}%`, `共 ${stats.participantCount} 应参加人次`, "blue")}

              ${progressRow("活动归档率", stats.archiveRate, "已结束活动", "")}
              ${progressRow("成员出勤率", stats.attendanceRate, "全部有效活动", "green")}
              ${progressRow("请假人次占比", stats.leaveRate, "全部有效活动", "blue")}

          </div>

            <div class="section-head">
              <h2>最近活动</h2>
              <button class="btn ghost" data-view="activities">查看全部</button>

                  <div class="activity-mini">

    function statCard(label, value, note, className) {
      return `<div class="card stat-card ${className}"><div class="stat-label">${label}</div><div class="stat-value">${value}</div><div class="stat-note">${note}</div></div>`;
    }

    function progressRow(label, value, note, className) {
      const safeValue = Math.max(0, Math.min(100, value));
      return `
        <div>
          <div class="progress-row-head">
            <span class="progress-label">${label}<small class="muted"> · ${note}</small></span>
            <span class="progress-value">${safeValue}%</span>
          </div>
          <div class="progress-track" role="progressbar" aria-label="${label}" aria-valuenow="${safeValue}" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-fill ${className}" style="width:${safeValue}%"></div>
          </div>
        </div>
      `;
    }

      const keyword = logFilters.keyword.trim().toLowerCase();
      const logs = state.logs.filter(log => {
        const matchKeyword = !keyword || `${log.target} ${log.detail} ${log.actor}`.toLowerCase().includes(keyword);
        const matchAction = !logFilters.action || log.action === logFilters.action;
        return matchKeyword && matchAction;
      });
      const actions = [...new Set(state.logs.map(log => log.action))];
      return `
        <section class="page-head">
          <div>
            <h1>操作日志</h1>
            <p class="page-desc">追踪活动添加、修改、取消、删除、签到和归档等关键操作。</p>
          </div>
        </section>
        <section class="card">
          <div class="log-filter">

            <select id="logAction" class="select" style="max-width:180px">
              <option value="">全部操作</option>
              ${actions.map(action => `<option ${logFilters.action === action ? "selected" : ""}>${escapeHtml(action)}</option>`).join("")}

    function actionTag(action) {
      const dangerActions = ["删除活动", "取消活动", "停用人员", "停用类型"];
      const successActions = ["创建活动", "归档活动", "新增人员", "新增类型"];
      const className = dangerActions.includes(action) ? "danger" : successActions.includes(action) ? "success" : "info";
      return `<span class="tag ${className}">${escapeHtml(action)}</span>`;
    }

    function renderStudentActivities() {
      const student = getUser(state.studentId);
      const keyword = studentFilters.keyword.trim().toLowerCase();
      const activities = visibleActivities()
        .filter(activity => !activity.cancelled && activity.participants.some(item => item.userId === student.id))
        .filter(activity => {
          const matchKeyword = !keyword || `${activity.name} ${activity.location} ${getUser(activity.leaderId).name}`.toLowerCase().includes(keyword);
          const matchType = !studentFilters.typeId || activity.typeId === studentFilters.typeId;
          const matchStatus = !studentFilters.status || activityStatus(activity) === studentFilters.status;
          return matchKeyword && matchType && matchStatus;
        })
        .sort((a, b) => new Date(b.start) - new Date(a.start));
      const upcoming = activities.filter(activity => ["未开始", "进行中"].includes(activityStatus(activity))).length;
      return `
        <section class="student-hero">
          <div>
            <h1>${escapeHtml(student.name)}，欢迎查看组织活动</h1>
            <p>这里展示与你相关的活动安排、参与状态、会议纪要和归档材料。学生端仅提供查看权限。</p>
          </div>
          <div class="hero-count"><strong>${upcoming}</strong><span>场待参与活动</span></div>
        </section>
        <section class="card filter-card">
          <div class="filters" style="grid-template-columns:minmax(280px,1.5fr) 200px 200px auto">
            <div class="field">
              <label for="studentKeyword">搜索活动</label>
              <input id="studentKeyword" class="input" value="${escapeHtml(studentFilters.keyword)}" placeholder="活动名称、地点或负责人">
            </div>
            <div class="field">
              <label for="studentType">活动类型</label>
              <select id="studentType" class="select">
                <option value="">全部类型</option>
                ${state.types.map(type => `<option value="${type.id}" ${studentFilters.typeId === type.id ? "selected" : ""}>${escapeHtml(type.name)}</option>`).join("")}
              </select>
            </div>
            <div class="field">
              <label for="studentStatus">活动状态</label>
              <select id="studentStatus" class="select">
                <option value="">全部状态</option>
                ${["未开始","进行中","待完善","已完成","已归档"].map(item => `<option ${studentFilters.status === item ? "selected" : ""}>${item}</option>`).join("")}
              </select>
            </div>
            <button class="btn secondary" data-action="reset-student-filters">重置</button>
          </div>
        </section>
        ${activities.length ? `
          <section class="student-grid">
            ${activities.map(activity => {
              const participant = activity.participants.find(item => item.userId === student.id);
              return `
                <article class="activity-card">
                  <div class="card-top">
                    <span class="tag info">${escapeHtml(getType(activity.typeId).name)}</span>
                    ${statusTag(activityStatus(activity))}
                  </div>
                  <h3>${escapeHtml(activity.name)}</h3>
                  <p>${escapeHtml(activity.introduction)}</p>
                  <div class="card-meta">
                    <div class="card-meta-row"><span>活动时间</span><strong>${formatDateTime(activity.start)}</strong></div>
                    <div class="card-meta-row"><span>活动地点</span><strong>${escapeHtml(activity.location)}</strong></div>
                    <div class="card-meta-row"><span>负责人</span><strong>${escapeHtml(getUser(activity.leaderId).name)}</strong></div>
                  </div>
                  <div class="card-footer">
                    <div>我的状态：${attendanceTag(participant.attendance)}</div>
                    <button class="btn ghost" data-action="student-detail" data-id="${activity.id}">查看详情</button>
                  </div>
                </article>
              `;
            }).join("")}
          </section>
        ` : `<div class="card">${emptyState("暂无相关活动", "当前筛选条件下没有可查看的活动。")}</div>`}
      `;
    }

    function emptyState(title, description) {
      return `<div class="empty"><div class="empty-mark">空</div><strong>${title}</strong><span>${description}</span></div>`;
    }

    function bindViewEvents() {
      document.querySelectorAll("[data-view]").forEach(button => {
        button.addEventListener("click", () => {
          state.view = button.dataset.view;
          renderApp();
        });
      });

      const roleSelect = document.getElementById("roleSelect");
      if (roleSelect) roleSelect.addEventListener("change", event => {
        state.role = event.target.value;
        state.view = state.role === "admin" ? "dashboard" : "studentActivities";
        renderApp();
      });

      const studentSelect = document.getElementById("studentSelect");
      if (studentSelect) studentSelect.addEventListener("change", event => {
        state.studentId = event.target.value;
        renderApp();
      });

      document.querySelectorAll("[data-action]").forEach(button => {
        button.addEventListener("click", () => handleAction(button.dataset.action, button.dataset.id));
      });

      bindFilter("activityKeyword", "input", value => activityFilters.keyword = value);
      bindFilter("activityStart", "change", value => activityFilters.start = value);
      bindFilter("activityType", "change", value => activityFilters.typeId = value);
      bindFilter("activityPerson", "change", value => activityFilters.personId = value);
      bindFilter("activityStatus", "change", value => activityFilters.status = value);
      bindFilter("studentKeyword", "input", value => studentFilters.keyword = value);
      bindFilter("studentType", "change", value => studentFilters.typeId = value);
      bindFilter("studentStatus", "change", value => studentFilters.status = value);
      bindFilter("logKeyword", "input", value => logFilters.keyword = value);
      bindFilter("logAction", "change", value => logFilters.action = value);
    }

    function bindFilter(id, eventName, setter) {
      const element = document.getElementById(id);
      if (!element) return;
      let timer;
      element.addEventListener(eventName, event => {
        setter(event.target.value);
        clearTimeout(timer);
        timer = setTimeout(renderApp, eventName === "input" ? 180 : 0);
      });
    }

    function handleAction(action, id) {
      const actions = {
        "add-activity": () => openActivityForm(),
        "edit-activity": () => openActivityForm(id),
        "detail": () => openActivityDetail(id, false),
        "student-detail": () => openActivityDetail(id, true),
        "delete-activity": () => requestDeleteActivity(id),
        "reset-activity-filters": () => { activityFilters = { keyword: "", start: "", end: "", typeId: "", personId: "", status: "" }; renderApp(); },
        "add-person": () => openPersonForm(),
        "edit-person": () => openPersonForm(id),
        "toggle-person": () => togglePerson(id),
        "add-type": () => openTypeForm(),
        "edit-type": () => openTypeForm(id),
        "toggle-type": () => toggleType(id),
        "reset-student-filters": () => { studentFilters = { keyword: "", typeId: "", status: "" }; renderApp(); }
      };
      if (actions[action]) actions[action]();
    }

    function openDrawer(content, wide = false) {
      const overlay = document.getElementById("drawerOverlay");
      overlay.innerHTML = `<section class="drawer ${wide ? "wide" : ""}" role="dialog" aria-modal="true">${content}</section>`;
      overlay.classList.add("open");
      overlay.setAttribute("aria-hidden", "false");
      overlay.addEventListener("mousedown", event => {
        if (event.target === overlay) closeDrawer();
      }, { once: true });
      document.addEventListener("keydown", drawerEscape);
      setTimeout(() => overlay.querySelector("input, select, textarea, button")?.focus(), 0);
    }

    function drawerEscape(event) {
      if (event.key === "Escape") closeDrawer();
    }

    function closeDrawer() {
      const overlay = document.getElementById("drawerOverlay");
      overlay.classList.remove("open");
      overlay.setAttribute("aria-hidden", "true");
      overlay.innerHTML = "";
      document.removeEventListener("keydown", drawerEscape);
      activeDetailId = null;
    }

    function openActivityForm(id = null) {
      const activity = id ? getActivity(id) : null;
      const selected = activity ? activity.participants.map(item => item.userId) : [];
      const activeTypes = state.types.filter(type => type.active || type.id === activity?.typeId);
      const activeUsers = state.users.filter(user => user.active || selected.includes(user.id) || user.id === activity?.leaderId);
      openDrawer(`
        <form id="activityForm" novalidate>
          <div class="drawer-head">
            <div><h2>${activity ? "编辑活动" : "添加活动"}</h2><div class="muted">${activity ? `当前版本 V${activity.version}` : "填写活动基础信息与参与人员"}</div></div>
            <button class="icon-btn" type="button" data-close aria-label="关闭">×</button>
          </div>
          <div class="drawer-body">
            <div id="activityFormError" class="field-error hidden" role="alert" style="margin-bottom:14px"></div>
            <div class="form-grid">
              <div class="field span-2">
                <label class="required" for="formName">活动名称</label>
                <input id="formName" name="name" class="input" maxlength="100" value="${escapeHtml(activity?.name || "")}" placeholder="例如：六月主题党日活动" required>
              </div>
              <div class="field">
                <label class="required" for="formType">活动类型</label>
                <select id="formType" name="typeId" class="select" required>
                  <option value="">请选择活动类型</option>
                  ${activeTypes.map(type => `<option value="${type.id}" ${activity?.typeId === type.id ? "selected" : ""}>${escapeHtml(type.name)}</option>`).join("")}
                </select>
              </div>
              <div class="field">
                <label class="required" for="formLeader">负责人</label>
                <select id="formLeader" name="leaderId" class="select" required>
                  <option value="">请选择负责人</option>
                  ${activeUsers.map(user => `<option value="${user.id}" ${activity?.leaderId === user.id ? "selected" : ""}>${escapeHtml(user.name)} · ${escapeHtml(user.number)}</option>`).join("")}
                </select>
              </div>
              <div class="field">

    }

    function saveActivityForm(event, id) {
      event.preventDefault();
      const form = event.currentTarget;
      const data = new FormData(form);
      const participantIds = data.getAll("participants");
      const error = document.getElementById("activityFormError");
      const start = data.get("start");
      const end = data.get("end");
      const required = ["name", "typeId", "leaderId", "start", "end", "location", "introduction"];
      const missing = required.some(key => !String(data.get(key) || "").trim());
      if (missing || !participantIds.length || new Date(end) <= new Date(start)) {
        error.textContent = missing
          ? "请完成所有必填项。"
          : !participantIds.length
            ? "请至少选择 1 名参与人员。"
            : "结束时间必须晚于开始时间。";
        error.classList.remove("hidden");
        form.querySelector(":invalid")?.focus();
        return;
      }

      const now = new Date().toISOString();
      if (id) {
        const activity = getActivity(id);
        const oldParticipants = new Map(activity.participants.map(item => [item.userId, item.attendance]));
        activity.versions.push({
          version: activity.version,
          time: activity.updatedAt,
          actor: activity.updatedBy,
          note: `保存 V${activity.version} 数据快照`
        });
        activity.name = String(data.get("name")).trim();
        activity.typeId = data.get("typeId");
        activity.leaderId = data.get("leaderId");
        activity.start = new Date(start).toISOString();
        activity.end = new Date(end).toISOString();
        activity.location = String(data.get("location")).trim();
        activity.introduction = String(data.get("introduction")).trim();
        activity.participants = participantIds.map(userId => ({
          userId,
          attendance: oldParticipants.get(userId) || "待登记"
        }));
        activity.version += 1;
        activity.updatedBy = ADMIN.name;
        activity.updatedAt = now;
        logAction("修改活动", activity.name, `活动信息更新至 V${activity.version}`);
        toast("活动修改已保存");
      } else {
        const activity = {
          id: cryptoId(),
          name: String(data.get("name")).trim(),
          typeId: data.get("typeId"),
          start: new Date(start).toISOString(),
          end: new Date(end).toISOString(),
          location: String(data.get("location")).trim(),
          leaderId: data.get("leaderId"),
          introduction: String(data.get("introduction")).trim(),
          participants: participantIds.map(userId => ({ userId, attendance: "待登记" })),
          minutes: "",
          images: [],
          archived: false,
          cancelled: false,
          deleted: false,
          version: 1,
          versions: [{ version: 1, time: now, actor: ADMIN.name, note: "创建活动" }],
          createdBy: ADMIN.name,
          createdAt: now,
          updatedBy: ADMIN.name,
          updatedAt: now
        };
        state.activities.unshift(activity);
        logAction("创建活动", activity.name, `创建 V1，参与人员 ${participantIds.length} 人`);
        toast("活动创建成功");
      }
      saveState();
      closeDrawer();
      state.view = "activities";
      renderApp();
    }

                  <p>${activity.archived ? "归档后活动信息默认只读，历史记录仍可查看。" : "归档前需完成所有人员状态登记并填写会议纪要。"}</p>

            : `<textarea id="minutesText" class="textarea" placeholder="记录会议主要内容、讨论结果和后续分工">${escapeHtml(activity.minutes)}</textarea>

    function renderHistoryPanel(activity) {
      const versions = [...activity.versions].sort((a, b) => b.version - a.version);
      const logs = state.logs.filter(log => log.target === activity.name).slice(0, 12);
      return `
        <h3>版本记录</h3>
        <div class="timeline">
          ${versions.length ? versions.map(item => `
            <div class="timeline-item">
              <div class="timeline-title">V${item.version} · ${escapeHtml(item.note)}</div>
              <div class="timeline-meta">${formatDateTime(item.time)} · ${escapeHtml(item.actor)}</div>
            </div>
          `).join("") : '<span class="muted">暂无版本记录</span>'}
        </div>
        <h3 style="margin-top:26px">相关操作</h3>
        <div class="timeline">
          ${logs.length ? logs.map(log => `
            <div class="timeline-item">
              <div class="timeline-title">${escapeHtml(log.action)}</div>
              <div class="timeline-meta">${formatDateTime(log.time)} · ${escapeHtml(log.actor)}</div>
              <div class="timeline-desc">${escapeHtml(log.detail)}</div>
            </div>
          `).join("") : '<span class="muted">暂无相关操作</span>'}
        </div>
      `;
    }

    function bindDetailEvents(activity, readOnly) {
      document.querySelector("[data-close]").addEventListener("click", closeDrawer);
      document.querySelectorAll("[data-tab]").forEach(tab => tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(item => item.classList.toggle("active", item.dataset.tab === tab.dataset.tab));
        document.querySelectorAll(".tab-panel").forEach(panel => panel.classList.toggle("active", panel.id === `tab-${tab.dataset.tab}`));
      }));
      if (readOnly) return;

      document.querySelectorAll("[data-detail-action]").forEach(button => button.addEventListener("click", () => {
        const action = button.dataset.detailAction;
        if (action === "edit") {
          closeDrawer();
          openActivityForm(activity.id);
        }
        if (action === "cancel") requestCancelActivity(activity.id);
        if (action === "all-signed") {
          activity.participants.forEach(item => item.attendance = "已签到");
          activity.updatedAt = new Date().toISOString();
          activity.updatedBy = ADMIN.name;
          logAction("登记签到", activity.name, "将全部参与人员标记为已签到");
          saveState();
          toast("已完成全部签到");
          closeDrawer();
          openActivityDetail(activity.id, false, "attendance");
        }
        if (action === "save-minutes") {
          const value = document.getElementById("minutesText").value.trim();
          activity.minutes = value;
          activity.updatedAt = new Date().toISOString();
          activity.updatedBy = ADMIN.name;
          logAction("更新纪要", activity.name, value ? "保存会议纪要文本" : "清空会议纪要文本");
          saveState();
          toast("会议纪要已保存");
        }
        if (action === "archive") toggleArchive(activity.id);
      }));

      document.querySelectorAll(".attendance-select").forEach(select => select.addEventListener("change", event => {
        const participant = activity.participants.find(item => item.userId === select.dataset.userId);
        participant.attendance = event.target.value;
        activity.updatedAt = new Date().toISOString();
        activity.updatedBy = ADMIN.name;
        logAction("登记签到", activity.name, `${getUser(participant.userId).name} 更新为“${participant.attendance}”`);
        saveState();
        toast("参与状态已更新");
      }));

      const imageInput = document.getElementById("imageInput");
      if (imageInput) imageInput.addEventListener("change", event => uploadImages(event, activity.id));
      document.querySelectorAll("[data-remove-image]").forEach(button => button.addEventListener("click", () => removeImage(activity.id, Number(button.dataset.removeImage))));
    }

    function uploadImages(event, activityId) {
      const activity = getActivity(activityId);
      const files = [...event.target.files];
      if (activity.images.length + files.length > 6) {
        toast("活动图片最多保留 6 张", "error");
        return;
      }
      if (files.some(file => file.size > 2 * 1024 * 1024)) {
        toast("单张图片不能超过 2MB", "error");
        return;
      }
      let completed = 0;
      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = () => {
          activity.images.push({ name: file.name, data: reader.result, uploadedAt: new Date().toISOString(), uploadedBy: ADMIN.name });
          completed += 1;
          if (completed === files.length) {
            logAction("上传图片", activity.name, `上传 ${files.length} 张活动图片`);
            try {
              saveState();
              toast("活动图片已上传");
              closeDrawer();
              openActivityDetail(activity.id, false, "minutes");
            } catch (error) {
              activity.images.splice(-files.length);
              toast("浏览器本地存储空间不足，请减少图片数量", "error");
            }
          }
        };
        reader.readAsDataURL(file);
      });
    }

    function removeImage(activityId, index) {
      const activity = getActivity(activityId);
      const removed = activity.images.splice(index, 1)[0];
      logAction("删除图片", activity.name, `删除图片“${removed.name}”`);
      saveState();
      toast("图片已删除");
      closeDrawer();
      openActivityDetail(activity.id, false, "minutes");
    }

    function toggleArchive(id) {
      const activity = getActivity(id);
      if (!activity.archived) {
        const pending = activity.participants.some(item => item.attendance === "待登记");
        if (pending || !activity.minutes.trim()) {
          toast(pending ? "归档前请完成全部人员状态登记" : "归档前请填写会议纪要", "error");
          return;
        }
      }
      const willArchive = !activity.archived;
      showConfirm(
        willArchive ? "确认归档活动？" : "解除活动归档？",
        willArchive ? "归档后活动信息将变为只读，仍可查看版本与操作记录。" : "解除归档后可以继续修改签到、纪要和活动信息。",
        willArchive ? "确认归档" : "解除归档",
        () => {
          activity.archived = willArchive;
          activity.updatedAt = new Date().toISOString();
          activity.updatedBy = ADMIN.name;
          logAction(willArchive ? "归档活动" : "解除归档", activity.name, willArchive ? "活动资料完成归档" : "活动恢复为可编辑状态");
          saveState();
          closeModal();
          closeDrawer();
          renderApp();
          toast(willArchive ? "活动已归档" : "已解除归档");
        }
      );
    }

    function requestCancelActivity(id) {
      const activity = getActivity(id);
      showConfirm("确认取消活动？", `取消后“${activity.name}”不会进入统计，但仍保留记录。`, "取消活动", () => {
        activity.cancelled = true;
        activity.updatedAt = new Date().toISOString();
        activity.updatedBy = ADMIN.name;
        logAction("取消活动", activity.name, "管理员取消活动");
        saveState();
        closeModal();
        closeDrawer();
        renderApp();
        toast("活动已取消");
      }, true);
    }

    function requestDeleteActivity(id) {
      const activity = getActivity(id);
      showConfirm("确认删除活动？", `“${activity.name}”将从活动列表隐藏，但操作日志与数据仍会保留。`, "删除活动", () => {
        activity.deleted = true;
        activity.updatedAt = new Date().toISOString();
        activity.updatedBy = ADMIN.name;
        logAction("删除活动", activity.name, "活动执行软删除");
        saveState();
        closeModal();
        renderApp();
        toast("活动已删除");
      }, true);
    }

            <div class="form-grid">
              <div class="field span-2">
                <label class="required" for="personName">姓名</label>
                <input id="personName" name="name" class="input" maxlength="30" value="${escapeHtml(user?.name || "")}" required>
              </div>
              <div class="field span-2">
                <label class="required" for="personNumber">学号/工号</label>
                <input id="personNumber" name="number" class="input" maxlength="30" value="${escapeHtml(user?.number || "")}" required>

        event.preventDefault();
        const data = new FormData(event.currentTarget);
        const name = String(data.get("name") || "").trim();
        const number = String(data.get("number") || "").trim();
        const duplicate = state.users.some(item => item.number === number && item.id !== id);

        () => {

          logAction(willActive ? "启用人员" : "停用人员", user.name, willActive ? "恢复人员使用状态" : "保留历史引用并停止新活动选择");
          saveState();
          closeModal();
          renderApp();

    function openTypeForm(id = null) {
      const type = id ? getType(id) : null;
      openDrawer(`
        <form id="typeForm" novalidate>
          <div class="drawer-head">
            <div><h2>${type ? "编辑活动类型" : "添加活动类型"}</h2><div class="muted">类型用于活动分类与筛选</div></div>
            <button class="icon-btn" type="button" data-close aria-label="关闭">×</button>
          </div>
          <div class="drawer-body">
            <div id="typeFormError" class="field-error hidden" role="alert" style="margin-bottom:14px"></div>
            <div class="field">
              <label class="required" for="typeName">类型名称</label>
              <input id="typeName" name="name" class="input" maxlength="30" value="${escapeHtml(type?.name || "")}" required>
            </div>
          </div>
          <div class="drawer-foot">
            <button class="btn secondary" type="button" data-close>取消</button>
            <button class="btn" type="submit">保存</button>
          </div>
        </form>
      `);
      document.querySelectorAll("[data-close]").forEach(button => button.addEventListener("click", closeDrawer));
      document.getElementById("typeForm").addEventListener("submit", event => {
        event.preventDefault();
        const name = String(new FormData(event.currentTarget).get("name") || "").trim();
        const duplicate = state.types.some(item => item.name === name && item.id !== id);
        const error = document.getElementById("typeFormError");
        if (!name || duplicate) {
          error.textContent = duplicate ? "该活动类型已经存在。" : "请填写活动类型名称。";
          error.classList.remove("hidden");
          return;
        }
        if (type) {
          const oldName = type.name;
          type.name = name;
          logAction("修改类型", name, `由“${oldName}”修改为“${name}”`);
          toast("活动类型已更新");
        } else {
          const newType = { id: cryptoId(), name, color: TYPE_COLORS[state.types.length % TYPE_COLORS.length], active: true };
          state.types.push(newType);
          logAction("新增类型", name, "新增活动类型");
          toast("活动类型添加成功");
        }
        saveState();
        closeDrawer();
        renderApp();
      });
    }

    function toggleType(id) {
      const type = getType(id);
      const willActive = !type.active;
      showConfirm(
        willActive ? "确认启用类型？" : "确认停用类型？",
        willActive ? `“${type.name}”将重新出现在活动创建表单中。` : `“${type.name}”将不再用于创建新活动，已有活动不受影响。`,
        willActive ? "确认启用" : "确认停用",
        () => {
          type.active = willActive;
          logAction(willActive ? "启用类型" : "停用类型", type.name, willActive ? "恢复活动类型" : "停止用于新活动");
          saveState();
          closeModal();
          renderApp();
          toast(willActive ? "活动类型已启用" : "活动类型已停用");
        },
        !willActive
      );
    }

    function showConfirm(title, description, confirmText, onConfirm, danger = false) {
      confirmAction = onConfirm;
      const overlay = document.getElementById("modalOverlay");
      overlay.innerHTML = `
        <section class="modal" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle">
          <div class="modal-head"><h3 id="confirmTitle">${escapeHtml(title)}</h3></div>
          <div class="modal-body">${escapeHtml(description)}</div>
          <div class="modal-foot">
            <button class="btn secondary" id="confirmCancel">返回</button>
            <button class="btn ${danger ? "danger" : ""}" id="confirmOk">${escapeHtml(confirmText)}</button>
          </div>
        </section>
      `;
      overlay.classList.add("open");
      overlay.setAttribute("aria-hidden", "false");
      document.getElementById("confirmCancel").addEventListener("click", closeModal);
      document.getElementById("confirmOk").addEventListener("click", () => confirmAction?.());
      setTimeout(() => document.getElementById("confirmCancel").focus(), 0);
    }

    function closeModal() {
      const overlay = document.getElementById("modalOverlay");
      overlay.classList.remove("open");
      overlay.setAttribute("aria-hidden", "true");
      overlay.innerHTML = "";
      confirmAction = null;
    }

    renderApp();
    hydrateFromBackend();
  </script>
</body>
</html>
